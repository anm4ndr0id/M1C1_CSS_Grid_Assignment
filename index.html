<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M1C1 CSS Grid Assignment</title>
    <link rel="stylesheet" href="style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="gridOne">
        <p>Hola Mundo</p>
        <p style="color: blue;">Contenido</p>
    </div>

    <br><br><br>

    <div class="gridTwo">
        <div class="red-box">
            <p>Mi</p>
        </div>
        <div class="blue-box">
            <p>primer</p>
        </div>
        <div class="yellow-box">
            <p>checkpoint</p>
        </div>
    </div>

    <br><br><br>

    <div class="gridThree">
        <div class="row-1">
            <p>Primer texto de prueba</p>
        </div>
        <div class="row-2">
            <img src="images/ice.jpg" alt="Ice">
        </div>
    </div>

    <br><br><br>

    <div class="gridFour">
        <div class="text-top">
            <p>Segundo texto de prueba</p>
        </div>
        <div id="nestedGrid">
            <p>Texto izquierdo</p>
            <p>Texto derecho</p>
        </div>
    </div>

    <br><br><br>

    <div class="gridFive">
        <div class="text-top-5">
            <p>Tercer texto de prueba</p>
        </div>
        <div id="nestedGridImages">
            <img src="images/lantern.jpg" alt="Lantern">
            <img src="images/street.jpg" alt="Street">
        </div>
    </div>

    <br><br><br>

    <div class="gridSix">
        <div class="icon-box">
            <i class="fa-solid fa-rocket"></i>
        </div>
        <div class="text-box">
            <p class="custom-font">ESTAS SON FUENTES DE GOOGLE FONTS</p>
        </div>
    </div>

    <br><br>

</body>
</html>
